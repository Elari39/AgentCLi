server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history 模式 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 图片与静态资源：长缓存
    location ~* \.(png|jpg|jpeg|gif|svg|webp|ico|css|js|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 运行时 fetch 的大 md
    location /docs/ {
        try_files $uri =404;
    }

    # gzip 压缩
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/markdown;
}
